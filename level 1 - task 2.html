<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Basics Demonstration</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f6f9;
            color: #333;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 8px;
        }

        #colorBtn {
            padding: 12px 24px;
            font-size: 16px;
            border: 2px solid #34495e;
            background-color: white;
            color: #34495e;
            cursor: pointer;
            border-radius: 4px;
            transition: background-color 0.3s, color 0.3s;
        }

        .bg-changed {
            background-color: #e74c3c !important;
            color: white !important;
            border-color: #e74c3c !important;
        }

        .calculator input {
            padding: 8px;
            font-size: 16px;
            width: 150px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .calculator button {
            padding: 8px 16px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .calculator button:hover {
            background-color: #27ae60;
        }

        #result {
            font-size: 18px;
            margin-left: 10px;
            color: #2c3e50;
        }
    </style>
</head>

<body>

    <div class="section">
        <h2>1. Change Button Color on Click</h2>
        <p>Click the button below to toggle its background color.</p>
        <button id="colorBtn" onclick="changeColor()">Click Me!</button>
    </div>

    <div class="section">
        <h2>2. Time-Based Greeting</h2>
        <p>Click the button below to trigger the alert box based on your current time.</p>
        <button onclick="showGreeting()" style="padding: 10px 20px; cursor: pointer;">Trigger Alert</button>
    </div>

    <div class="section">
        <h2>3. Basic Addition Calculator</h2>
        <p>Enter two numbers below and click "=" to add them together.</p>
        <div class="calculator">
            <input type="number" id="num1" placeholder="First number">
            <span>+</span>
            <input type="number" id="num2" placeholder="Second number">
            <button onclick="calculateSum()">=</button>
            <span id="result"><strong>0</strong></span>
        </div>
    </div>

    <script>

        function changeColor() {
            const button = document.getElementById('colorBtn');

            button.classList.toggle('bg-changed');
        }


        function showGreeting() {
            const currentHour = new Date().getHours(); // Gets hour (0-23)
            let greeting;

            if (currentHour < 12) {
                greeting = "Good morning!";
            } else if (currentHour < 18) {
                greeting = "Good afternoon!";
            } else {
                greeting = "Good evening!";
            }

            alert(greeting);
        }


        function calculateSum() {

            const val1 = document.getElementById('num1').value;
            const val2 = document.getElementById('num2').value;


            const number1 = parseFloat(val1);
            const number2 = parseFloat(val2);

            if (isNaN(number1) || isNaN(number2)) {
                document.getElementById('result').innerHTML = "<span style='color: red;'>Please enter valid numbers</span>";
                return;
            }


            const sum = number1 + number2;
            document.getElementById('result').innerHTML = "<strong>" + sum + "</strong>";
        }
    </script>

</body>

</html>
