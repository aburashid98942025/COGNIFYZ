<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Modern Landing Page</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }

        /* Navbar */

        nav {
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #38bdf8;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            width: 0%;
            height: 2px;
            background: #38bdf8;
            left: 0;
            bottom: -5px;
            transition: 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #38bdf8;
        }

        /* Hero Section */

        .hero {
            width: 100%;
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 8%;
            gap: 50px;
            flex-wrap: wrap;
        }

        .hero-text {
            flex: 1;
            min-width: 300px;
        }

        .hero-text h1 {
            font-size: 55px;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .hero-text h1 span {
            color: #38bdf8;
        }

        .hero-text p {
            color: #cbd5e1;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            font-weight: 500;
        }

        .primary-btn {
            background: #38bdf8;
            color: #0f172a;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 10px 20px rgba(56, 189, 248, 0.3);
        }

        .secondary-btn {
            background: transparent;
            border: 1px solid #38bdf8;
            color: white;
        }

        .secondary-btn:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        /* Image */

        .hero-image {
            flex: 1;
            min-width: 300px;
            display: flex;
            justify-content: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 500px;
            border-radius: 25px;
            box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.5);
            transition: 0.4s;
        }

        .hero-image img:hover {
            transform: scale(1.03);
        }

        /* Form Section */

        .form-section {
            width: 100%;
            padding: 80px 8%;
            display: flex;
            justify-content: center;
        }

        .form-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-card h2 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 32px;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            font-size: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #38bdf8;
            color: #0f172a;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0px 10px 20px rgba(56, 189, 248, 0.4);
        }

        /* Responsive */

        @media(max-width:900px) {

            .hero-text h1 {
                font-size: 40px;
            }

            .hero {
                text-align: center;
            }

            .hero-buttons {
                justify-content: center;
            }

            nav {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->

    <nav>

        <div class="logo">Cognifyz</div>

        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>

    </nav>

    <!-- Hero Section -->

    <section class="hero">

        <div class="hero-text">

            <h1>
                Build Modern <span>Web Experiences</span>
            </h1>

            <p>
                Create beautiful and responsive websites using HTML, CSS,
                and modern UI/UX principles. This project demonstrates a
                stylish landing page with navigation, image, and form design.
            </p>

            <div class="hero-buttons">
                <button class="btn primary-btn">Get Started</button>
                <button class="btn secondary-btn">Learn More</button>
            </div>

        </div>

        <div class="hero-image">

            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?q=80&w=1200&auto=format&fit=crop"
                alt="Web Development">

        </div>

    </section>

    <!-- Form Section -->

    <section class="form-section">

        <div class="form-card">

            <h2>Join Us Today</h2>

            <form>

                <div class="input-box">
                    <input type="text" placeholder="Enter your name" required>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <button class="submit-btn">Submit</button>

            </form>

        </div>

    </section>

</body>

</html>
