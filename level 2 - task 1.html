<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Card - Bulma</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
</head>
<body>

  <div class="section">
    <div class="container" style="max-width: 400px;">
      
      <div class="card">
        <div class="card-image">
          <figure class="image is-4by3">
            <img src="https://picsum.photos/800/600" alt="Placeholder image">
          </figure>
        </div>
        
        <div class="card-content">
          <div class="media">
            <div class="media-content">
              <p class="title is-4">Explore the World</p>
              <p class="subtitle is-6">@adventure_awaits</p>
            </div>
          </div>

          <div class="content">
            Nature always wears the colors of the spirit. Dive into new adventures and discover breathtaking landscapes around the globe.
            <br>
            <time datetime="2026-06-04">9:42 PM - 4 Jun 2026</time>
          </div>
        </div>
      </div>
      </div>
  </div>

</body>
</html>
